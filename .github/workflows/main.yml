name: Main Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Compute a unique version for every main build.
      # Scheme: `<pkg.version>-b<run_number>` (e.g. 1.0.0-b42)
      - name: Set Version
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version || '0.1.0'")
          VERSION="${PKG_VERSION}-b${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Name
        id: repo_name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.REPO }}:latest
            ghcr.io/${{ steps.repo_name.outputs.REPO }}:v${{ steps.version.outputs.VERSION }}

      - name: Create and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin v${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true

      # Tells Coolify to pull the image we just pushed to GHCR and recreate the
      # container. Kept last so a transient Coolify outage doesn't block the
      # immutable artefacts (Docker tag, GitHub release).
      - name: Trigger Coolify deployment
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 5 --max-time 30 \
            --request GET \
            --header "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "${COOLIFY_WEBHOOK_URL}"
